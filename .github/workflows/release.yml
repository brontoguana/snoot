name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build Linux binary
        run: bun build --compile src/index.ts --outfile dist/snoot-linux-x64

      - name: Build Windows binary
        run: bun build --compile --target bun-windows-x64 src/index.ts --outfile dist/snoot-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/snoot-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/snoot-windows-x64.exe

  installer:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.version.outputs.version }} installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/snoot-installer.exe

  release:
    runs-on: ubuntu-latest
    needs: [build, installer]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/snoot-linux-x64 \
            dist/snoot-installer.exe \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
